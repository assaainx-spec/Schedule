<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Work Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFC72C;
      --bg: #111111;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --border: #333333;
      --text: #ffffff;
      --muted: #888888;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* Yellow header */
    .header-bar {
      background: var(--yellow);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo { display: flex; align-items: center; gap: 0.6rem; }
    .m-icon {
      font-size: 1.8rem;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .title-block .title {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
    }
    .title-block .subtitle {
      font-size: 0.68rem;
      font-weight: 500;
      color: #555;
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(0,0,0,0.12);
      border-radius: 20px;
      padding: 0.3rem 0.7rem;
    }
    .month-nav button {
      background: none;
      border: none;
      color: #111;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: rgba(0,0,0,0.15); }
    .month-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #111;
      min-width: 110px;
      text-align: center;
    }

    /* Body */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2rem;
    }

    /* Week strip */
    .week-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .week-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .week-arrows { display: flex; gap: 0.4rem; }
    .week-arrows button {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.28rem 0.65rem;
      border-radius: 20px;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .week-arrows button:hover {
      background: var(--yellow);
      color: #111;
      border-color: var(--yellow);
    }

    /* Sync bar */
    .sync-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sync-dot.ok    { background: #6fcf6f; }
    .sync-dot.error { background: #cf6f6f; }

    /* Day cards */
    .days { display: flex; flex-direction: column; gap: 0.45rem; }

    .day-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 0.45rem;
      align-items: stretch;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .day-row:nth-child(1) { animation-delay: 0.04s; }
    .day-row:nth-child(2) { animation-delay: 0.08s; }
    .day-row:nth-child(3) { animation-delay: 0.12s; }
    .day-row:nth-child(4) { animation-delay: 0.16s; }
    .day-row:nth-child(5) { animation-delay: 0.20s; }
    .day-row:nth-child(6) { animation-delay: 0.24s; }
    .day-row:nth-child(7) { animation-delay: 0.28s; }

    .day-label {
      background: var(--surface);
      border-radius: 12px;
      padding: 0.6rem 0.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .day-name {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .day-date {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    .day-label.today { background: var(--yellow); }
    .day-label.today .day-name { color: #666; }
    .day-label.today .day-date { color: #111; }

    .day-content {
      background: var(--surface);
      border-radius: 12px;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      min-height: 60px;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .day-content.has-shift { border: 1.5px solid #2a2a2a; }
    .no-shift { font-size: 0.75rem; color: var(--border); font-weight: 500; }

    .shift-tag {
      background: var(--yellow);
      color: #111;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.22rem 0.65rem;
      border-radius: 20px;
    }

    /* Notice */
    .notice {
      margin-top: 1.5rem;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
    }
    .notice p { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
    .notice strong { color: var(--yellow); }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.67rem;
      color: var(--border);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="header-bar">
  <div class="header-logo">
    <div class="m-icon">M</div>
    <div class="title-block">
      <div class="title">My Schedule</div>
      <div class="subtitle">McDonald's Rooster</div>
    </div>
  </div>
  <div class="month-nav">
    <button id="prevMonth">&#8592;</button>
    <div class="month-label" id="monthLabel">&#8212;</div>
    <button id="nextMonth">&#8594;</button>
  </div>
</div>

<div class="container">
  <div class="week-strip">
    <div class="week-label" id="weekLabel">&#8212;</div>
    <div class="week-arrows">
      <button id="prevWeek">&#8592; Prev</button>
      <button id="nextWeek">Next &#8594;</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">checking for updates&#8230;</span>
  </div>

  <div class="days" id="daysContainer"></div>

  <div class="notice" id="notice">
    <p>
      No schedule data yet.<br/>
      <strong>Shifts will appear here automatically</strong><br/>
      once your Google Apps Script reads your roster emails.
    </p>
  </div>

  <footer>auto-synced from gmail &middot; updates every hour</footer>
</div>

<script>
  const SCHEDULE_JSON    = './schedule.json';
  const POLL_INTERVAL_MS = 5 * 60 * 1000;

  const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  let shifts    = JSON.parse(localStorage.getItem('schedule_shifts') || '{}');
  let weekStart = getMonday(new Date());

  function getMonday(d) {
    const date = new Date(d);
    const day  = date.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    date.setHours(0, 0, 0, 0);
    return date;
  }
  function dateKey(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }
  function isToday(d) {
    const t = new Date();
    return d.getFullYear() === t.getFullYear() &&
           d.getMonth()    === t.getMonth()    &&
           d.getDate()     === t.getDate();
  }

  async function fetchSchedule() {
    const dot   = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    try {
      const res = await fetch(SCHEDULE_JSON + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      shifts = await res.json();
      localStorage.setItem('schedule_shifts', JSON.stringify(shifts));
      dot.className     = 'sync-dot ok';
      label.textContent = 'last synced ' + new Date().toLocaleTimeString();
      render();
    } catch (e) {
      dot.className     = 'sync-dot error';
      label.textContent = 'could not sync — showing cached data';
      render();
    }
  }

  function render() {
    const thursday = addDays(weekStart, 3);
    document.getElementById('monthLabel').textContent =
      MONTHS[thursday.getMonth()] + ' ' + thursday.getFullYear();

    const weekEnd = addDays(weekStart, 6);
    document.getElementById('weekLabel').textContent =
      weekStart.getDate() + ' ' + MONTHS[weekStart.getMonth()].slice(0,3) + ' - ' +
      weekEnd.getDate()   + ' ' + MONTHS[weekEnd.getMonth()].slice(0,3);

    const container = document.getElementById('daysContainer');
    container.innerHTML = '';
    let hasAnyShift = false;

    DAYS.forEach((name, i) => {
      const day       = addDays(weekStart, i);
      const key       = dateKey(day);
      const dayShifts = shifts[key] || [];
      if (dayShifts.length) hasAnyShift = true;

      const row = document.createElement('div');
      row.className = 'day-row';

      const lbl = document.createElement('div');
      lbl.className = 'day-label' + (isToday(day) ? ' today' : '');
      lbl.innerHTML =
        '<div class="day-name">' + name.slice(0,3) + '</div>' +
        '<div class="day-date">' + day.getDate() + '</div>';

      const content = document.createElement('div');
      content.className = 'day-content' + (dayShifts.length ? ' has-shift' : '');
      if (dayShifts.length === 0) {
        content.innerHTML = '<span class="no-shift">Day off</span>';
      } else {
        dayShifts.forEach(s => {
          const tag = document.createElement('span');
          tag.className   = 'shift-tag';
          tag.textContent = s;
          content.appendChild(tag);
        });
      }

      row.appendChild(lbl);
      row.appendChild(content);
      container.appendChild(row);
    });

    document.getElementById('notice').style.display = hasAnyShift ? 'none' : 'block';
  }

  document.getElementById('prevWeek').onclick  = () => { weekStart = addDays(weekStart,  -7); render(); };
  document.getElementById('nextWeek').onclick  = () => { weekStart = addDays(weekStart,   7); render(); };
  document.getElementById('prevMonth').onclick = () => { weekStart = addDays(weekStart, -28); render(); };
  document.getElementById('nextMonth').onclick = () => { weekStart = addDays(weekStart,  28); render(); };

  window.addShift = (dateStr, shiftText) => {
    if (!shifts[dateStr]) shifts[dateStr] = [];
    shifts[dateStr].push(shiftText);
    localStorage.setItem('schedule_shifts', JSON.stringify(shifts));
    render();
  };

  fetchSchedule();
  setInterval(fetchSchedule, POLL_INTERVAL_MS);
</script>
</body>
</html>
