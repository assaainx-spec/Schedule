<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Work Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #27A737;
      --green-dark: #1e8a2b;
      --yellow: #FFC72C;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #ffffff;
      --muted: #7a7a7a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Green header ── */
    .header-bar {
      background: var(--green);
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .header-logo { display: flex; align-items: center; gap: 0.75rem; }

    /* McDonald's golden arches SVG */
    .mcd-logo { width: 36px; height: 36px; flex-shrink: 0; }

    .title-block .title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .title-block .subtitle {
      font-size: 0.67rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0,0,0,0.18);
      border-radius: 20px;
      padding: 0.28rem 0.65rem;
    }
    .month-nav button {
      background: none;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: rgba(255,255,255,0.15); }
    .month-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      min-width: 105px;
      text-align: center;
    }

    /* ── Container ── */
    .container {
      max-width: 580px;
      margin: 0 auto;
      padding: 1.1rem 1rem 2.5rem;
    }

    /* ── Week strip ── */
    .week-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }
    .week-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .week-arrows { display: flex; gap: 0.4rem; }
    .week-arrows button {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 0.73rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.26rem 0.6rem;
      border-radius: 20px;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .week-arrows button:hover {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    /* ── Sync bar ── */
    .sync-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
      font-size: 0.68rem;
      color: var(--muted);
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .sync-dot.ok    { background: var(--green); }
    .sync-dot.error { background: #cf4444; }

    /* ── Day cards ── */
    .days { display: flex; flex-direction: column; gap: 0.4rem; }

    .day-row {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 0.4rem;
      align-items: stretch;
      animation: fadeUp 0.22s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .day-row:nth-child(1) { animation-delay: 0.03s; }
    .day-row:nth-child(2) { animation-delay: 0.07s; }
    .day-row:nth-child(3) { animation-delay: 0.11s; }
    .day-row:nth-child(4) { animation-delay: 0.15s; }
    .day-row:nth-child(5) { animation-delay: 0.19s; }
    .day-row:nth-child(6) { animation-delay: 0.23s; }
    .day-row:nth-child(7) { animation-delay: 0.27s; }

    .day-label {
      background: var(--surface);
      border-radius: 12px;
      padding: 0.55rem 0.4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .day-name {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .day-date {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    .day-label.today {
      background: var(--green);
    }
    .day-label.today .day-name { color: rgba(255,255,255,0.7); }
    .day-label.today .day-date { color: #fff; }

    .day-content {
      background: var(--surface);
      border-radius: 12px;
      padding: 0.55rem 0.9rem;
      display: flex;
      align-items: center;
      min-height: 58px;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .day-content.has-shift {
      border-left: 3px solid var(--green);
    }
    .no-shift {
      font-size: 0.72rem;
      color: var(--border);
      font-weight: 500;
    }
    .shift-tag {
      background: var(--yellow);
      color: #111;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      letter-spacing: -0.01em;
    }

    /* ── Notice ── */
    .notice {
      margin-top: 1.5rem;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
    }
    .notice p { font-size: 0.78rem; color: var(--muted); line-height: 1.75; }
    .notice strong { color: var(--green); }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.64rem;
      color: var(--border);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<!-- Green header with real golden arches -->
<div class="header-bar">
  <div class="header-logo">
    <!-- McDonald's golden arches -->
    <svg class="mcd-logo" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 55 C10 55 10 10 22 10 C34 10 34 40 40 40 C46 40 46 10 58 10 C70 10 70 55 70 55 L60 55 C60 55 60 22 58 22 C54 22 52 55 40 55 C28 55 26 22 22 22 C20 22 20 55 20 55 Z" fill="#FFC72C"/>
    </svg>
    <div class="title-block">
      <div class="title">My Schedule</div>
      <div class="subtitle">McDonald's Rooster</div>
    </div>
  </div>
  <div class="month-nav">
    <button id="prevMonth">&#8592;</button>
    <div class="month-label" id="monthLabel">&#8212;</div>
    <button id="nextMonth">&#8594;</button>
  </div>
</div>

<div class="container">
  <div class="week-strip">
    <div class="week-label" id="weekLabel">&#8212;</div>
    <div class="week-arrows">
      <button id="prevWeek">&#8592; Prev</button>
      <button id="nextWeek">Next &#8594;</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">checking for updates&#8230;</span>
  </div>

  <div class="days" id="daysContainer"></div>

  <div class="notice" id="notice">
    <p>
      No schedule data yet.<br/>
      <strong>Shifts will appear here automatically</strong><br/>
      once your Google Apps Script reads your roster emails.
    </p>
  </div>

  <footer>auto-synced from gmail &middot; updates every hour</footer>
</div>

<script>
  const SCHEDULE_JSON    = './schedule.json';
  const POLL_INTERVAL_MS = 5 * 60 * 1000;

  const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  let shifts    = JSON.parse(localStorage.getItem('schedule_shifts') || '{}');
  let weekStart = getMonday(new Date());

  function getMonday(d) {
    const date = new Date(d);
    const day  = date.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    date.setHours(0, 0, 0, 0);
    return date;
  }
  function dateKey(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }
  function isToday(d) {
    const t = new Date();
    return d.getFullYear() === t.getFullYear() &&
           d.getMonth()    === t.getMonth()    &&
           d.getDate()     === t.getDate();
  }

  async function fetchSchedule() {
    const dot   = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    try {
      const res = await fetch(SCHEDULE_JSON + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      shifts = await res.json();
      localStorage.setItem('schedule_shifts', JSON.stringify(shifts));
      dot.className     = 'sync-dot ok';
      label.textContent = 'last synced ' + new Date().toLocaleTimeString();
      render();
    } catch (e) {
      dot.className     = 'sync-dot error';
      label.textContent = 'could not sync — showing cached data';
      render();
    }
  }

  function render() {
    const thursday = addDays(weekStart, 3);
    document.getElementById('monthLabel').textContent =
      MONTHS[thursday.getMonth()] + ' ' + thursday.getFullYear();

    const weekEnd = addDays(weekStart, 6);
    document.getElementById('weekLabel').textContent =
      weekStart.getDate() + ' ' + MONTHS[weekStart.getMonth()].slice(0,3) + ' - ' +
      weekEnd.getDate()   + ' ' + MONTHS[weekEnd.getMonth()].slice(0,3);

    const container = document.getElementById('daysContainer');
    container.innerHTML = '';
    let hasAnyShift = false;

    DAYS.forEach((name, i) => {
      const day       = addDays(weekStart, i);
      const key       = dateKey(day);
      const dayShifts = shifts[key] || [];
      if (dayShifts.length) hasAnyShift = true;

      const row = document.createElement('div');
      row.className = 'day-row';

      const lbl = document.createElement('div');
      lbl.className = 'day-label' + (isToday(day) ? ' today' : '');
      lbl.innerHTML =
        '<div class="day-name">' + name.slice(0,3) + '</div>' +
        '<div class="day-date">' + day.getDate() + '</div>';

      const content = document.createElement('div');
      content.className = 'day-content' + (dayShifts.length ? ' has-shift' : '');
      if (dayShifts.length === 0) {
        content.innerHTML = '<span class="no-shift">Day off</span>';
      } else {
        dayShifts.forEach(s => {
          const tag = document.createElement('span');
          tag.className   = 'shift-tag';
          tag.textContent = s;
          content.appendChild(tag);
        });
      }

      row.appendChild(lbl);
      row.appendChild(content);
      container.appendChild(row);
    });

    document.getElementById('notice').style.display = hasAnyShift ? 'none' : 'block';
  }

  document.getElementById('prevWeek').onclick  = () => { weekStart = addDays(weekStart,  -7); render(); };
  document.getElementById('nextWeek').onclick  = () => { weekStart = addDays(weekStart,   7); render(); };
  document.getElementById('prevMonth').onclick = () => { weekStart = addDays(weekStart, -28); render(); };
  document.getElementById('nextMonth').onclick = () => { weekStart = addDays(weekStart,  28); render(); };

  window.addShift = (dateStr, shiftText) => {
    if (!shifts[dateStr]) shifts[dateStr] = [];
    shifts[dateStr].push(shiftText);
    localStorage.setItem('schedule_shifts', JSON.stringify(shifts));
    render();
  };

  fetchSchedule();
  setInterval(fetchSchedule, POLL_INTERVAL_MS);
</script>
</body>
</html>
